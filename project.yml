name: Cally
options:
  bundleIdPrefix: co.dylan
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Cally:
    type: application
    platform: macOS
    preBuildScripts:
      - name: Generate Secrets.swift from .env
        script: bash "$SRCROOT/scripts/generate-secrets.sh"
        outputFiles:
          - $(SRCROOT)/Sources/Generated/Secrets.swift
        basedOnDependencyAnalysis: false
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
    info:
      path: Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Cally
        CFBundleDisplayName: Cally
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "© 2026 Dylan Young"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.dylan.cally
        PRODUCT_NAME: Cally
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
